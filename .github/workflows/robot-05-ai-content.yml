name: Robot 05 - AI Content Fallback

# Solo manual — el Robot 5 solo deberia correr cuando humano publica unidades
# sin content_es completo. Cost-controlled via limit default bajo.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        type: boolean
        default: false
      limit:
        description: 'Max unidades a enriquecer (default 20, max 100)'
        type: string
        default: '20'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Run Robot 05
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          npx tsx src/robots/05-ai-content/run.ts $ARGS
