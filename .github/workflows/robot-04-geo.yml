name: Robot 04 - Geo Enrichment

on:
  schedule:
    # Diario 3am CDMX (09:00 UTC) - horario de bajo trafico
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        type: boolean
        default: false
      limit:
        description: 'Max desarrollos (rate limit 1/seg via Nominatim)'
        type: string
        default: '50'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./propyte-crm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: propyte-crm/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Run Robot 04
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          npx tsx src/robots/04-geo/run.ts $ARGS
