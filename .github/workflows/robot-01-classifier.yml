name: Robot 01 - Classifier + Extractor

on:
  schedule:
    # Cada 6 horas
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        type: boolean
        default: false
      limit:
        description: 'Max properties (leave empty for all)'
        type: string
        default: ''
      source:
        description: 'Filter by source domain (ej: goodlers.com)'
        type: string
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Run Robot 01
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          BANXICO_API_TOKEN: ${{ secrets.BANXICO_API_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ -n "${{ inputs.source }}" ]; then ARGS="$ARGS --source ${{ inputs.source }}"; fi
          npx tsx src/robots/01-classifier/run.ts $ARGS
